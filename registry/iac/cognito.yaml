AWSTemplateFormatVersion: "2010-09-09"
Description: Cognito User Pool for AWS Agent Registry M2M authentication

Parameters:
  domainPrefix:
    Type: String
    Description: Domain prefix for Cognito hosted UI

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: agent-registry-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref domainPrefix
      UserPoolId: !Ref UserPool

  ResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      Identifier: agent-registry-api
      Name: Agent Registry API
      Scopes:
        - ScopeName: invoke
          ScopeDescription: Invoke registry write operations
        - ScopeName: read
          ScopeDescription: Read registry records
      UserPoolId: !Ref UserPool

  M2MClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: ResourceServer
    Properties:
      ClientName: agent-registry-m2m-client
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - agent-registry-api/invoke
        - agent-registry-api/read

Outputs:
  outUserPoolId:
    Value: !Ref UserPool
    Description: Cognito User Pool ID
    Export:
      Name: agent-registry-cognito-user-pool-id

  outUserPoolArn:
    Value: !GetAtt UserPool.Arn
    Description: Cognito User Pool ARN
    Export:
      Name: agent-registry-cognito-user-pool-arn

  outProviderUrl:
    Value: !GetAtt UserPool.ProviderURL
    Description: Cognito Provider URL (issuer)

  outM2MClientId:
    Value: !Ref M2MClient
    Description: Cognito M2M Client ID (client_credentials)
    Export:
      Name: agent-registry-cognito-m2m-client-id

  outDomain:
    Value: !Sub "https://${domainPrefix}.auth.${AWS::Region}.amazoncognito.com"
    Description: Cognito Hosted UI / Token Endpoint Base URL

  outWellKnown:
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}/.well-known/openid-configuration"
    Description: OIDC discovery endpoint
